{% extends "base.html" %}

{% block content %}
<h2>{{ title }}</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Данные объекта</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.title }}</td>
                <td>{{ item }}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
